version = 1
requires-python = ">=3.10"

[[package]]
name = "code-review-env"
version = "1.0.0"
source = { editable = "." }
dependencies = [
    { name = "fastapi" },
    { name = "openai" },
    { name = "openenv-core" },
    { name = "pydantic" },
    { name = "python-multipart" },
    { name = "pyyaml" },
    { name = "uvicorn" },
]

[package.metadata]
requires-dist = [
    { name = "fastapi", specifier = ">=0.100.0" },
    { name = "openai", specifier = ">=1.0" },
    { name = "openenv-core", specifier = ">=0.2.0" },
    { name = "pydantic", specifier = ">=2.0" },
    { name = "python-multipart", specifier = ">=0.0.6" },
    { name = "pyyaml", specifier = ">=6.0" },
    { name = "uvicorn", specifier = ">=0.23.0" },
]

[[package]]
name = "fastapi"
version = "0.115.0"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "openai"
version = "1.50.0"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "openenv-core"
version = "0.2.0"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "pydantic"
version = "2.9.0"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "python-multipart"
version = "0.0.9"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "pyyaml"
version = "6.0.2"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "uvicorn"
version = "0.30.0"
source = { registry = "https://pypi.org/simple" }
