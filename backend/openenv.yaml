name: code-review-env
version: "1.0.0"
description: "OpenEnv-compliant RL benchmark for AI-powered code review agents"
author: "Code Review Assistant Team"

environment:
  class: CodeReviewEnv
  module: env.environment
  endpoints:
    - reset
    - step
    - state
  deterministic: true
  requires_gpu: false
  requires_internet: false

observation:
  type: dict
  fields:
    file_name: str
    diff: str
    issues: list[str]
    metadata: dict

action:
  type: dict
  fields:
    action_type:
      type: str
      allowed:
        - view_file
        - comment_issue
        - approve_pr
        - request_changes
    comment:
      type: str
      required: false

tasks:
  - name: easy
    module: tasks.task_easy
    class: TaskEasy
    description: "Style and documentation review"
    pass_threshold: 0.7
    max_steps: 10
    expected_issues:
      - missing_docstring
      - unused_variable

  - name: medium
    module: tasks.task_medium
    class: TaskMedium
    description: "Security bug detection and test coverage"
    pass_threshold: 0.6
    max_steps: 10
    expected_issues:
      - sql_injection
      - missing_unit_tests
      - logic_bug

  - name: hard
    module: tasks.task_hard
    class: TaskHard
    description: "Complex refactoring with auth bypass and performance regression"
    pass_threshold: 0.5
    max_steps: 10
    expected_issues:
      - authentication_bypass
      - performance_regression
      - flaky_test_behavior

grader:
  module: grader.task_graders
  score_range: [0.0, 1.0]
  normalize: true

baseline:
  agent: BaselineAgent
  module: baseline
  scores:
    easy: 0.75
    medium: 0.62
    hard: 0.51
